<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椎名立希识别器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        h2 {
            text-align: center;
            color: #667eea;
            margin: 20px 0;
            font-size: 22px;
        }
        .random-section {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8eaff 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8eaff;
        }
        .upload-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .file-info {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
        .preview-container {
            text-align: center;
            margin: 20px 0;
            display: none;
        }
        .preview-image {
            max-width: 100%;
            max-height: 500px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            color: white;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #randomBtn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4);
            margin-bottom: 10px;
        }
        #submitBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .result.success {
            background: #e8f5e9;
            border: 2px solid #4caf50;
        }
        .result.error {
            background: #ffebee;
            border: 2px solid #f44336;
        }
        .result h2 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .result p {
            margin: 5px 0;
            color: #666;
        }
        .confidence {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        .probability-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }
        .probability-table td {
            padding: 8px;
            text-align: center;
            background: #f5f5f5;
            border-radius: 5px;
        }
        .gallery-stats {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
        .loading {
            text-align: center;
            margin: 20px 0;
            display: none;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥁 椎名立希识别器 🥁</h1>

        <!-- 随机立希展示区（放在最上面） -->
        <div class="random-section">
            <h2>🎲 随机立希展示</h2>

            <!-- 随机图片预览 -->
            <div class="preview-container" id="randomPreviewContainer" style="display: none;">
                <img class="preview-image" id="randomPreview" src="" alt="随机立希预览">
            </div>

            <!-- 随机按钮 -->
            <button id="randomBtn">🎲 点击获得一个立希✨</button>

            <!-- 图库统计 -->
            <div class="gallery-stats" id="galleryStats">
                🖼️ 展示图库加载中...
            </div>
        </div>

        <div class="divider"></div>

        <!-- 正式识别功能 -->
        <h2>📸 上传图片识别</h2>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div>点击或拖拽上传图片</div>
            <div class="file-info">支持 jpg/png 格式，最大16MB</div>
        </div>

        <input type="file" id="fileInput" accept="image/*" style="display: none;">

        <div class="preview-container" id="previewContainer">
            <img class="preview-image" id="preview" src="" alt="预览">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在识别立希中... 🥁</p>
        </div>

        <button id="submitBtn" disabled>📤 上传并识别</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        // 获取元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById('submitBtn');
        const randomBtn = document.getElementById('randomBtn');
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const galleryStats = document.getElementById('galleryStats');
        const randomPreview = document.getElementById('randomPreview');
        const randomPreviewContainer = document.getElementById('randomPreviewContainer');

        let selectedFile = null;

        // 点击上传区域触发文件选择
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 拖拽上传支持
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        // 文件选择处理
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            // 检查文件类型
            const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif', 'image/bmp'];
            if (!validTypes.includes(file.type)) {
                alert('请上传jpg/png格式的图片');
                return;
            }

            // 检查文件大小（16MB）
            if (file.size > 16 * 1024 * 1024) {
                alert('图片不能超过16MB');
                return;
            }

            selectedFile = file;

            // 显示预览
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                previewContainer.style.display = 'block';
            };
            reader.readAsDataURL(file);

            // 启用提交按钮
            submitBtn.disabled = false;

            // 隐藏之前的结果
            resultDiv.style.display = 'none';
        }

        // 提交识别
        submitBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // 显示加载动画
            loading.style.display = 'block';
            submitBtn.disabled = true;
            randomBtn.disabled = true;
            resultDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    // 提取数值
                    const probNotTaki = parseFloat(data.probabilities['非立希']);
                    const probIsTaki = parseFloat(data.probabilities['是立希']);

                    // 判断是否不确定
                    const isUncertain = data.uncertain === true;

                    if (isUncertain) {
                        resultDiv.className = 'result';
                        resultDiv.style.background = '#fff9c4';  // 黄色背景
                        resultDiv.style.border = '2px solid #ff9800';  // 橙色边框
                        resultDiv.innerHTML = `
                            <h2 style="color: #ff9800;">❓ 不确定</h2>
                            <p style="font-size: 18px; color: #ff9800; font-weight: bold; margin: 10px 0;">置信度太低，无法准确识别</p>
                            <div class="confidence">最高置信度: ${(Math.max(probNotTaki, probIsTaki) * 100).toFixed(2)}%</div>
                            <table class="probability-table">
                                <tr>
                                    <td>非立希</td>
                                    <td>是立希</td>
                                </tr>
                                <tr>
                                    <td>${(probNotTaki * 100).toFixed(2)}%</td>
                                    <td>${(probIsTaki * 100).toFixed(2)}%</td>
                                </tr>
                            </table>
                        `;
                    } else if (data.is_taki) {
                        resultDiv.className = 'result success';
                        resultDiv.innerHTML = `
                            <h2>✅ 是立希！</h2>
                            <p>${data.message}</p>
                            <p style="font-size: 18px; color: #667eea; font-weight: bold; margin: 10px 0;">${data.praise}</p>
                            <div class="confidence">置信度: ${(probIsTaki * 100).toFixed(2)}%</div>
                            <table class="probability-table">
                                <tr>
                                    <td>非立希</td>
                                    <td>是立希</td>
                                </tr>
                                <tr>
                                    <td>${(probNotTaki * 100).toFixed(2)}%</td>
                                    <td>${(probIsTaki * 100).toFixed(2)}%</td>
                                </tr>
                            </table>
                        `;
                    } else {
                        resultDiv.className = 'result error';
                        resultDiv.innerHTML = `
                            <h2>❌ 不是立希</h2>
                            <p>${data.message}</p>
                            <p style="font-size: 18px; color: #f44336; font-weight: bold; margin: 10px 0;">${data.praise}</p>
                            <div class="confidence" style="color: #f44336;">置信度: ${(probNotTaki * 100).toFixed(2)}%</div>
                            <table class="probability-table">
                                <tr>
                                    <td>非立希</td>
                                    <td>是立希</td>
                                </tr>
                                <tr>
                                    <td>${(probNotTaki * 100).toFixed(2)}%</td>
                                    <td>${(probIsTaki * 100).toFixed(2)}%</td>
                                </tr>
                            </table>
                        `;
                    }
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `<p>错误: ${data.error}</p>`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<p>网络错误: ${error.message}</p>`;
            } finally {
                loading.style.display = 'none';
                resultDiv.style.display = 'block';
                submitBtn.disabled = false;
                randomBtn.disabled = false;
            }
        });

        // 随机立希按钮（只显示图片，不自动识别）
        randomBtn.addEventListener('click', async () => {
            randomBtn.disabled = true;

            try {
                const response = await fetch('/random-taki');
                const data = await response.json();

                if (data.success) {
                    // 在随机展示区显示图片
                    randomPreview.src = data.image_url;
                    randomPreviewContainer.style.display = 'block';

                    // 更新图库统计
                    galleryStats.innerHTML = `🖼️ 展示图库共有 ${data.total_images} 张精选立希图片`;

                    // 可选：滚动到下方识别区域
                    //document.getElementById('uploadArea').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert('展示图库中没有图片，请先添加');
                }
            } catch (error) {
                alert('获取随机图片失败');
            } finally {
                randomBtn.disabled = false;
            }
        });

        // 页面加载时获取图库统计
        async function loadGalleryStats() {
            try {
                const response = await fetch('/random-taki');
                const data = await response.json();
                if (data.success) {
                    galleryStats.innerHTML = `🖼️ 展示图库共有 ${data.total_images} 张精选立希图片`;
                } else {
                    galleryStats.innerHTML = '🖼️ 展示图库暂无图片';
                }
            } catch (error) {
                galleryStats.innerHTML = '🖼️ 展示图库加载失败';
            }
        }

        // 页面加载完成后调用
        loadGalleryStats();
    </script>
</body>
</html>
